name: CI

on:
  pull_request:
  push:
    branches: [main]
    tags: ['v*']


jobs:
  check-changelog:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Get changed changelog files
        id: changed-changelog-files
        uses: tj-actions/changed-files@v47
        with:
          files: |
            changelog/[0-9]*.*.md
      - name: Fail if no changelog message is present
        if: steps.changed-changelog-files.outputs.any_changed == 'false'
        run: |
          echo "No changelog entry found. Please add a changelog file (e.g. changelog/<PR>.feature.md)."
          echo "See changelog/README.md for details."
          exit 1

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Setup Biome
      uses: biomejs/setup-biome@v2
      with:
        version: 2.2.4

    - name: Run Biome
      run: biome ci .

    - name: Run tests
      run: npm run test

    - name: Build
      run: npm run build

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        version: ${{ inputs.uv-version }}
        python-version: ${{ inputs.python-version }}
        enable-cache: true

    - name: Install the project depedencies
      shell: bash
      run: |
        uv sync --all-extras --dev --locked

    - name: Run linting
      run: |
        uv run ruff check .

    - name: Run type checking
      run: |
        uv run mypy src/

    - name: Run tests
      run: |
        uv run coverage run -m pytest tests/ && uv run coverage report --fail-under=50
